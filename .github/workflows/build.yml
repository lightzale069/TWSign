name: Build TWSign Mobile App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Files
        uses: actions/checkout@v4

      - name: Setup Swift & Xcode Toolchain
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Compile App via Swift Package Manager
        run: |
          swift build -c release --triple arm64-apple-ios15.0

      - name: Package Into Unsigned IPA
        run: |
          mkdir -p Payload
          mkdir -p Payload/TWSign.app
          cp .build/arm64-apple-ios15.0/release/TWSign Payload/TWSign.app/TWSign
          cp Resources/Info.plist Payload/TWSign.app/Info.plist
          zip -r TWSign_Unsigned.ipa Payload

      - name: Export Output Payload
        uses: actions/upload-artifact@v4
        with:
          name: TWSign-Build
          path: TWSign_Unsigned.ipa
